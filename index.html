<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roast By Carnivore | Tatu City</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f5f0eb;
        }

        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #0f0f0f, #2a1a1a);
        }

        h1 {
            font-size: 4rem;
            font-family: 'Playfair Display', serif;
        }

        h1 span {
            color: #d4a574;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            margin: 10px;
        }

        .btn-primary {
            background: #c41e3a;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #d4a574;
            color: white;
        }
    </style>
</head>

<body>

    <section class="hero">
        <div>
            <h1>ROAST BY <span>CARNIVORE</span></h1>
            <p>Premium Dining Experience in Tatu City</p>

            <button class="btn btn-primary">View Menu</button>
            <button class="btn btn-outline">Call Now</button>
        </div>
    </section>

</body>
</html>
